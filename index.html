<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hair Revival — Elite Haircare for Men</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Unna:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="//cdn-images.mailchimp.com/embedcode/classic-061523.css" rel="stylesheet" type="text/css">
  <style>
    /* ── Brand Tokens ── */
    :root {
      --deep-fern:    #1D2828;
      --teal-forest:  #466060;
      --mist:         #D4E0E0;
      --terra-rust:   #B1462E;
      --burnt-umber:  #471C13;

      --bg:           #161F1F;
      --bg-panel:     rgba(12, 19, 19, 0.72);
      --text:         var(--mist);
      --text-support: #8aacac;
      --text-dim:     #456060;
      --border:       rgba(70, 96, 96, 0.4);
      --border-dim:   rgba(70, 96, 96, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ── Background image layer ── */
    .bg-image {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 20%;
      z-index: 0;
    }

    /* ── Overlay ── */
    .bg-overlay {
      position: fixed; inset: 0;
      background: rgba(22,31,31,0.75);
      pointer-events: none; z-index: 1;
    }


    /* ── Page ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      min-height: 100dvh; /* respects real browser chrome on mobile */
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
    }

    /* ── Hero block ── */
    .hero {
      max-width: 720px; width: 100%;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Coming Soon Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--border);
      padding: 6px 18px 6px 12px;
      font-family: 'Poppins', sans-serif; font-weight: 500;
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-support);
      margin-bottom: 20px;
      opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards;
    }
    .badge__dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--terra-rust); flex-shrink: 0; position: relative;
    }
    .badge__dot::after {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: var(--terra-rust); opacity: 0.4;
      animation: pulse 2.8s ease infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50%      { transform: scale(2.5); opacity: 0; }
    }

    /* ── Wordmark ── */
    .wordmark {
      margin-bottom: 20px;
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
    }
    .wordmark__name {
      font-family: 'Unna', 'Lora', serif; font-weight: 700;
      font-size: clamp(52px, 11vw, 96px);
      line-height: 0.90; letter-spacing: -0.02em;
      color: var(--mist); display: block;
      font-optical-sizing: auto;
      -webkit-font-smoothing: antialiased;
    }
    .wordmark__rule {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(212,224,224,0.4), transparent);
      margin: 12px 0 8px;
    }
    .wordmark__descriptor {
      font-family: 'Poppins', sans-serif; font-weight: 400;
      font-size: 10px; letter-spacing: 0.38em;
      text-transform: uppercase; color: #ffffff;
      display: block;
    }

    /* ── Tagline ── */
    .tagline {
      display: flex; flex-direction: column; align-items: center; gap: 0;
      opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
    }
    .tagline__line {
      display: block;
      font-family: 'Lora', serif;
      line-height: 1.2;
    }
    .tagline__line--1 {
      font-size: clamp(13px, 1.4vw, 15px);
      font-weight: 400; font-style: italic;
      letter-spacing: 0.12em;
      color: var(--text-support);
      text-transform: none;
    }
    .tagline__line--2 {
      font-size: clamp(28px, 4.5vw, 46px);
      font-weight: 700; font-style: normal;
      letter-spacing: -0.02em;
      color: var(--mist);
      margin: 6px 0 4px;
    }
    .tagline__line--3 {
      font-size: clamp(11px, 1.2vw, 13px);
      font-family: 'Poppins', sans-serif;
      font-weight: 400; font-style: normal;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--terra-rust);
    }
    .tagline__divider { display: none; }

    /* ── Form Panel ── */
    .form-panel {
      width: 100%; max-width: 440px;
      border: 1px solid rgba(70,96,96,0.5);
      border-top: 2px solid var(--terra-rust);
      background: rgba(10, 17, 17, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 22px 24px 20px;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.5),
        0 0 0 1px rgba(70,96,96,0.12) inset,
        0 1px 0 rgba(212,224,224,0.06) inset;
      opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards;
    }

    .form-heading {
      font-family: 'Lora', serif; font-weight: 700;
      font-size: 17px; letter-spacing: -0.02em;
      color: var(--mist);
      margin-bottom: 3px;
    }

    .form-eyebrow {
      font-family: 'Poppins', sans-serif; font-weight: 400;
      font-size: 11px;
      color: var(--text-support);
      margin-bottom: 14px; display: block;
      line-height: 1.5;
    }

    .form-divider {
      width: 32px; height: 1px;
      background: var(--terra-rust);
      margin-bottom: 14px;
    }

    /* ── Marketing Consent Checkbox ── */
    .hr-checkbox-label {
      display: flex; align-items: center; gap: 12px;
      margin-top: 10px; cursor: pointer;
    }
    .hr-checkbox-input { display: none; }
    .hr-checkbox-custom {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1px solid rgba(70,96,96,0.5);
      background: rgba(212,224,224,0.03);
      position: relative; transition: border-color 0.2s ease, background 0.2s ease;
    }
    .hr-checkbox-custom::after {
      content: '';
      position: absolute; top: 2px; left: 5px;
      width: 4px; height: 8px;
      border-right: 1.5px solid var(--mist);
      border-bottom: 1.5px solid var(--mist);
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s ease;
    }
    .hr-checkbox-input:checked ~ .hr-checkbox-custom {
      background: var(--terra-rust);
      border-color: var(--terra-rust);
    }
    .hr-checkbox-input:checked ~ .hr-checkbox-custom::after {
      transform: rotate(45deg) scale(1);
    }
    .hr-checkbox-text {
      font-family: 'Poppins', sans-serif; font-weight: 300;
      font-size: 11px; color: var(--text-support); line-height: 1.4;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-family: 'Poppins', sans-serif; font-weight: 300;
      font-size: 9px; letter-spacing: 0.14em; color: var(--text-dim);
      opacity: 0; animation: fadeUp 0.8s ease 1s forwards;
      text-align: center;
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive / Mobile ── */
    @media (max-width: 600px) {
      /* Layout */
      .page { padding: 12px 16px 12px; }
      .hero { margin-bottom: 10px; }

      /* Badge */
      .badge { margin-bottom: 8px; padding: 5px 14px 5px 10px; font-size: 8px; }

      /* Wordmark — single line, compact */
      .wordmark { margin-bottom: 8px !important; }
      .wordmark__name {
        font-size: 38px !important;
        display: block !important;
      }
      /* Hide the line-break so Hair Revival sits on one line */
      .wordmark__name br { display: none !important; }
      .wordmark__rule { margin: 8px 0 5px !important; }
      .wordmark__descriptor { font-size: 8px !important; letter-spacing: 0.28em !important; }

      /* Form panel */
      .form-panel { padding: 12px 16px 10px; }
      .form-heading { font-size: 14px; margin-bottom: 2px; }
      .form-eyebrow { font-size: 10px; margin-bottom: 6px; }
      .form-divider { margin-bottom: 6px; }

      /* Mailchimp fields */
      .mc-name-row { gap: 6px; margin-bottom: 6px; }

      #mc_embed_signup .indicates-required { display: none !important; }
      #mc_embed_signup .mc-field-group { margin-bottom: 5px !important; }
      #mc_embed_signup .mc-field-group label { margin-bottom: 3px !important; font-size: 7.5px !important; }
      #mc_embed_signup .mc-field-group input[type="email"],
      #mc_embed_signup .mc-field-group input[type="text"] { padding: 6px 10px !important; font-size: 12px !important; }
      #mc_embed_signup .clear { margin-top: 8px !important; }
      #mc_embed_signup .clear input#mc-embedded-subscribe {
        padding: 10px 24px !important;
        line-height: 1 !important;
        font-size: 9px !important;
      }
      .hr-checkbox-label { margin-top: 7px; }

      .footer { margin-top: 8px; font-size: 8px; }
    }

    /* ══════════════════════════════════════════
       Mailchimp Form Overrides — Hair Revival
    ══════════════════════════════════════════ */
    #mc_embed_shell { width: 100%; }

    #mc_embed_signup {
      background: transparent !important;
      width: 100% !important;
      font-family: 'Poppins', sans-serif !important;
      padding: 0 !important;
      clear: none !important;
      float: none !important;
    }

    /* Hide default Mailchimp "Subscribe" heading — we use our own */
    #mc_embed_signup h2 { display: none !important; }

    /* "* indicates required" */
    #mc_embed_signup .indicates-required {
      font-family: 'Poppins', sans-serif !important;
      font-size: 9.5px !important;
      letter-spacing: 0.10em !important;
      color: var(--text-dim) !important;
      margin: 0 0 10px !important;
      text-align: right !important;
    }
    #mc_embed_signup .indicates-required .asterisk,
    #mc_embed_signup .mc-field-group label .asterisk {
      color: var(--terra-rust) !important;
    }

    /* Field groups */
    #mc_embed_signup .mc-field-group {
      width: 100% !important;
      padding-bottom: 0 !important;
      min-height: unset !important;
      margin-bottom: 8px !important;
    }

    /* Labels */
    #mc_embed_signup .mc-field-group label {
      font-family: 'Poppins', sans-serif !important;
      font-size: 8.5px !important;
      letter-spacing: 0.18em !important;
      text-transform: uppercase !important;
      color: rgba(138,172,172,0.55) !important;
      font-weight: 500 !important;
      display: block !important;
      margin-bottom: 7px !important;
    }

    /* Inputs */
    #mc_embed_signup .mc-field-group input[type="email"],
    #mc_embed_signup .mc-field-group input[type="text"] {
      width: 100% !important;
      background: rgba(212,224,224,0.03) !important;
      border: 1px solid rgba(70,96,96,0.30) !important;
      border-radius: 0 !important;
      padding: 9px 12px !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 12px !important;
      font-weight: 300 !important;
      color: var(--mist) !important;
      outline: none !important;
      box-shadow: none !important;
      height: auto !important;
      -webkit-appearance: none !important;
      transition: border-color 0.2s ease, background 0.2s ease !important;
    }
    #mc_embed_signup .mc-field-group input[type="email"]:focus,
    #mc_embed_signup .mc-field-group input[type="text"]:focus {
      border-color: var(--terra-rust) !important;
      background: rgba(70,96,96,0.10) !important;
    }
    #mc_embed_signup .mc-field-group input::placeholder {
      color: rgba(138,172,172,0.20) !important;
    }

    /* First Name / Last Name: side by side */
    .mc-name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .mc-name-row .mc-field-group { margin-bottom: 0 !important; }

    /* Subscribe / Register button */
    #mc_embed_signup .clear {
      width: 100% !important;
      float: none !important;
      margin-top: 10px !important;
    }
    #mc_embed_signup .clear input#mc-embedded-subscribe {
      background: var(--terra-rust) !important;
      border: none !important;
      border-radius: 0 !important;
      width: 100% !important;
      padding: 13px 24px !important;
      font-family: 'Poppins', sans-serif !important;
      font-weight: 500 !important;
      font-size: 10px !important;
      letter-spacing: 0.26em !important;
      text-transform: uppercase !important;
      color: var(--mist) !important;
      cursor: pointer !important;
      box-shadow: 0 4px 24px rgba(177,70,46,0.28) !important;
      margin: 0 !important;
      height: auto !important;
      display: block !important;
      transition: background 0.2s ease, letter-spacing 0.2s ease !important;
    }
    #mc_embed_signup .clear input#mc-embedded-subscribe:hover {
      background: #c44f35 !important;
      letter-spacing: 0.32em !important;
    }

    /* Mailchimp error / success responses */
    #mc_embed_signup div#mce-responses {
      float: none !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    #mc_embed_signup div.response {
      font-family: 'Poppins', sans-serif !important;
      font-size: 11px !important;
      letter-spacing: 0.06em !important;
      padding: 12px 16px !important;
      margin: 10px 0 0 !important;
      float: none !important;
      width: 100% !important;
      border-radius: 0 !important;
    }
    #mc_embed_signup div#mce-error-response {
      background: rgba(177,70,46,0.10) !important;
      border-left: 2px solid var(--terra-rust) !important;
      color: #e8a090 !important;
    }
    #mc_embed_signup div#mce-success-response {
      background: rgba(70,96,96,0.15) !important;
      border-left: 2px solid var(--teal-forest) !important;
      color: var(--mist) !important;
    }

    #mc_embed_signup_scroll { width: 100% !important; }
  </style>
</head>

  <!-- Mailchimp validation (kept true to origin) -->
  <script type="text/javascript" src="//s3.amazonaws.com/downloads.mailchimp.com/js/mc-validate.js"></script>
  <script type="text/javascript">
    (function($) {
      window.fnames = new Array(); window.ftypes = new Array();
      fnames[0]='EMAIL'; ftypes[0]='email';
      fnames[1]='FNAME'; ftypes[1]='text';
      fnames[2]='LNAME'; ftypes[2]='text';
      fnames[4]='PHONE'; ftypes[4]='phone';
      fnames[3]='ADDRESS'; ftypes[3]='address';
      fnames[5]='BIRTHDAY'; ftypes[5]='birthday';
      fnames[6]='COMPANY'; ftypes[6]='text';
    }(jQuery));
    var $mcj = jQuery.noConflict(true);

    // SMS Phone Multi-Country Functionality
    if(!window.MC) { window.MC = {}; }
    window.MC.smsPhoneData = {
      defaultCountryCode: 'AU',
      programs: [],
      smsProgramDataCountryNames: []
    };

    function getCountryUnicodeFlag(countryCode) {
      return countryCode.toUpperCase().replace(/./g, (char) => String.fromCodePoint(char.charCodeAt(0) + 127397));
    }

    function sanitizeHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/\//g,'&#x2F;');
    }

    function sanitizeUrl(url) {
      if (typeof url !== 'string') return '';
      const t = url.trim().toLowerCase();
      if (t.startsWith('javascript:') || t.startsWith('data:') || t.startsWith('vbscript:')) return '#';
      return url;
    }

    const getBrowserLanguage = () => {
      if (!window?.navigator?.language?.split('-')[1]) return window?.navigator?.language?.toUpperCase();
      return window?.navigator?.language?.split('-')[1];
    };

    function getDefaultCountryProgram(defaultCountryCode, smsProgramData) {
      if (!smsProgramData || smsProgramData.length === 0) return null;
      const browserLanguage = getBrowserLanguage();
      if (browserLanguage) {
        const found = smsProgramData.find(p => p?.countryCode === browserLanguage);
        if (found) return found;
      }
      if (defaultCountryCode) {
        const found = smsProgramData.find(p => p?.countryCode === defaultCountryCode);
        if (found) return found;
      }
      return smsProgramData[0];
    }

    function updateSmsLegalText(countryCode, fieldName) {
      if (!countryCode || !fieldName) return;
      const programs = window?.MC?.smsPhoneData?.programs;
      if (!programs || !Array.isArray(programs)) return;
      const program = programs.find(p => p?.countryCode === countryCode);
      if (!program || !program.requiredTemplate) return;
      const legalTextElement = document.querySelector('#legal-text-' + fieldName);
      if (!legalTextElement) return;
      const divRegex = new RegExp('</?[div][^>]*>', 'gi');
      const template = program.requiredTemplate.replace(divRegex, '');
      legalTextElement.textContent = '';
      const parts = template.split(/(<a href=".*?" target=".*?">.*?<\/a>)/g);
      parts.forEach(function(part) {
        if (!part) return;
        const anchorMatch = part.match(/<a href="(.*?)" target="(.*?)">(.*?)<\/a>/);
        if (anchorMatch) {
          const linkElement = document.createElement('a');
          linkElement.href = sanitizeUrl(anchorMatch[1]);
          linkElement.target = sanitizeHtml(anchorMatch[2]);
          linkElement.textContent = sanitizeHtml(anchorMatch[3]);
          legalTextElement.appendChild(linkElement);
        } else {
          legalTextElement.appendChild(document.createTextNode(part));
        }
      });
    }

    function generateDropdownOptions(smsProgramData) {
      if (!smsProgramData || smsProgramData.length === 0) return '';
      return smsProgramData.map(program => {
        const flag = getCountryUnicodeFlag(program.countryCode);
        const countryName = getCountryName(program.countryCode);
        const callingCode = program.countryCallingCode || '';
        return '<option value="' + sanitizeHtml(program.countryCode||'') + '">' + sanitizeHtml(countryName||'') + ' ' + sanitizeHtml(callingCode||'') + '</option>';
      }).join('');
    }

    function getCountryName(countryCode) {
      if (window.MC?.smsPhoneData?.smsProgramDataCountryNames && Array.isArray(window.MC.smsPhoneData.smsProgramDataCountryNames)) {
        for (let i = 0; i < window.MC.smsPhoneData.smsProgramDataCountryNames.length; i++) {
          if (window.MC.smsPhoneData.smsProgramDataCountryNames[i].code === countryCode) return window.MC.smsPhoneData.smsProgramDataCountryNames[i].name;
        }
      }
      return countryCode;
    }

    function getDefaultPlaceholder(countryCode) {
      var mockPlaceholders = [{countryCode:'US',placeholder:'+1 000 000 0000'},{countryCode:'GB',placeholder:'+44 0000 000000'},{countryCode:'CA',placeholder:'+1 000 000 0000'},{countryCode:'AU',placeholder:'+61 000 000 000'},{countryCode:'DE',placeholder:'+49 000 0000000'},{countryCode:'FR',placeholder:'+33 0 00 00 00 00'},{countryCode:'ES',placeholder:'+34 000 000 000'},{countryCode:'NZ',placeholder:'+64 00 000 0000'}];
      if (!countryCode || typeof countryCode !== 'string') return mockPlaceholders[0].placeholder;
      const selected = mockPlaceholders.find(item => item && item.countryCode === countryCode);
      return selected ? selected.placeholder : mockPlaceholders[0].placeholder;
    }

    function updatePlaceholder(countryCode, fieldName) {
      if (!countryCode || !fieldName) return;
      const phoneInput = document.querySelector('#mce-' + fieldName);
      if (!phoneInput) return;
      const placeholder = getDefaultPlaceholder(countryCode);
      if (placeholder) phoneInput.placeholder = placeholder;
    }

    function updateCountryCodeInstruction(countryCode, fieldName) { updatePlaceholder(countryCode, fieldName); }

    function setDefaultHelpText(countryCode) {
      const helpTextSpan = document.querySelector('#help-text');
      if (!helpTextSpan) return;
    }

    function updateHelpTextCountryCode(countryCode, fieldName) {
      if (!countryCode || !fieldName) return;
      setDefaultHelpText(countryCode);
    }

    function initializeSmsPhoneDropdown(fieldName) {
      if (!fieldName || typeof fieldName !== 'string') return;
      const dropdown = document.querySelector('#country-select-' + fieldName);
      const displayFlag = document.querySelector('#flag-display-' + fieldName);
      if (!dropdown || !displayFlag) return;
      const smsPhoneData = window.MC?.smsPhoneData;
      if (smsPhoneData && smsPhoneData.programs && Array.isArray(smsPhoneData.programs)) {
        dropdown.innerHTML = generateDropdownOptions(smsPhoneData.programs);
      }
      const defaultProgram = getDefaultCountryProgram(smsPhoneData?.defaultCountryCode, smsPhoneData?.programs);
      if (defaultProgram && defaultProgram.countryCode) {
        dropdown.value = defaultProgram.countryCode;
        const flagSpan = displayFlag?.querySelector('#flag-emoji-' + fieldName);
        if (flagSpan) { flagSpan.textContent = getCountryUnicodeFlag(defaultProgram.countryCode); flagSpan.setAttribute('aria-label', sanitizeHtml(defaultProgram.countryCode) + ' flag'); }
        updateSmsLegalText(defaultProgram.countryCode, fieldName);
        updatePlaceholder(defaultProgram.countryCode, fieldName);
        updateCountryCodeInstruction(defaultProgram.countryCode, fieldName);
      }
      displayFlag?.addEventListener('click', function() { dropdown.focus(); });
      dropdown?.addEventListener('change', function() {
        const selectedCountry = this.value;
        if (!selectedCountry || typeof selectedCountry !== 'string') return;
        const flagSpan = displayFlag?.querySelector('#flag-emoji-' + fieldName);
        if (flagSpan) { flagSpan.textContent = getCountryUnicodeFlag(selectedCountry); flagSpan.setAttribute('aria-label', sanitizeHtml(selectedCountry) + ' flag'); }
        const selectedProgram = window.MC?.smsPhoneData?.programs.find(p => p && p.countryCode === selectedCountry);
        updateSmsLegalText(selectedCountry, fieldName);
        updatePlaceholder(selectedCountry, fieldName);
        updateCountryCodeInstruction(selectedCountry, fieldName);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      const smsPhoneFields = document.querySelectorAll('[id^="country-select-"]');
      smsPhoneFields.forEach(function(dropdown) {
        const fieldName = dropdown?.id.replace('country-select-', '');
        initializeSmsPhoneDropdown(fieldName);
      });

      // Override Mailchimp success message with custom text
      const successDiv = document.getElementById('mce-success-response');
      if (successDiv) {
        new MutationObserver(function() {
          if (successDiv.style.display !== 'none' && successDiv.innerHTML.trim() !== '') {
            successDiv.innerHTML = "Awesome, we'll keep you in the know!";
          }
        }).observe(successDiv, { attributes: true, childList: true, subtree: true });
      }
    });
  </script>

</body>
</html>
